<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Cozinha - Sirene</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --primary: #f59e0b;
      --danger: #ef4444;
      --success: #22c55e;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Tela de Início (Audio Gate) */
    #audio-gate {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      text-align: center;
      padding: 20px;
    }

    #audio-gate h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    #audio-gate p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 400px;
    }

    #audio-gate button {
      padding: 1.25rem 2.5rem;
      font-size: 1.25rem;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 1rem;
      cursor: pointer;
      font-weight: 800;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    }

    #audio-gate button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
    }

    /* Layout Principal */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #334155;
    }

    .brand h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(to right, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      margin: 0.25rem 0 0 0;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .status-badge {
      background: #334155;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    /* Grid de Alertas */
    .alert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.5rem;
    }

    .alert-card {
      background: var(--card-bg);
      border-radius: 1.25rem;
      padding: 1.75rem;
      position: relative;
      border: 1px solid #334155;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: card-in 0.5s ease-out;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert-card.new {
      border-color: var(--danger);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0% { border-color: rgba(239, 68, 68, 0.5); }
      50% { border-color: rgba(239, 68, 68, 1); box-shadow: 0 0 25px rgba(239, 68, 68, 0.3); }
      100% { border-color: rgba(239, 68, 68, 0.5); }
    }

    .alert-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .alert-item {
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }

    .alert-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      background: rgba(0,0,0,0.2);
      padding: 0.25rem 0.6rem;
      border-radius: 0.5rem;
    }

    .alert-setor {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
      font-weight: 700;
      font-size: 1.125rem;
    }

    .btn-done {
      margin-top: auto;
      background: var(--success);
      color: #fff;
      border: none;
      padding: 1rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-done:hover {
      background: #16a34a;
      transform: scale(1.02);
    }

    /* Estados Vazios */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 2rem;
      border: 2px dashed #334155;
    }

    .empty-state h2 {
      color: var(--text-muted);
      font-size: 1.5rem;
      margin: 0;
    }

    /* Responsividade */
    @media (max-width: 640px) {
      .app-container { padding: 1rem; }
      header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .alert-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="audio-gate">
    <h1>Monitor Cozinha</h1>
    <p>Para ouvir os alertas de voz, clique no botão abaixo para iniciar o monitor.</p>
    <button onclick="startSystem()">ATIVAR MONITOR</button>
  </div>

  <div class="app-container">
    <header>
      <div class="brand">
        <h1>Sirene Cozinha</h1>
        <p>Monitoramento em Tempo Real</p>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span id="last-update">Conectando...</span>
      </div>
    </header>

    <main id="alerts-container" class="alert-grid">
      <!-- Cards serão inseridos aqui -->
    </main>
  </div>

  <script>
    let knownAlerts = new Set();
    let audioEnabled = false;

    function startSystem() {
      document.getElementById('audio-gate').style.opacity = '0';
      setTimeout(() => document.getElementById('audio-gate').style.display = 'none', 300);
      audioEnabled = true;
      updateAlerts();
      setInterval(updateAlerts, 5000);
    }

    function speak(text) {
      if (!audioEnabled) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'pt-BR';
      utterance.rate = 1.0;
      utterance.pitch = 1.1;
      window.speechSynthesis.speak(utterance);
    }

    function playAlertSound() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.5);
    }

    function updateAlerts() {
      google.script.run
        .withSuccessHandler(handleUpdate)
        .buscarNovosAlertas();
    }

    function handleUpdate(res) {
      const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('last-update').innerText = `Última atualização: ${time}`;
      if (res.success) {
        renderAlerts(res.alertas);
      }
    }

    function renderAlerts(alertas) {
      const container = document.getElementById('alerts-container');
      if (!alertas || alertas.length === 0) {
        container.innerHTML = `<div class="empty-state"><h2>Nenhum pedido pendente</h2></div>`;
        knownAlerts.clear();
        return;
      }
      alertas.sort((a, b) => b.id - a.id);
      container.innerHTML = '';
      alertas.forEach(alerta => {
        const isNew = !knownAlerts.has(alerta.id);
        if (isNew) {
          playAlertSound();
          speak(`Atenção: Faltando ${alerta.item} do ${alerta.setor}`);
          knownAlerts.add(alerta.id);
        }
        const card = document.createElement('div');
        card.className = `alert-card ${isNew ? 'new' : ''}`;
        card.innerHTML = `
          <div class="alert-header">
            <span class="alert-time">📅 ${new Date(alerta.data).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
          </div>
          <div class="alert-item">${alerta.item}</div>
          <div class="alert-setor">📍 ${alerta.setor}</div>
          <button class="btn-done" onclick="concluir(${alerta.id}, this)">
            <span>MARCAR CONCLUÍDO</span>
          </button>
        `;
        container.appendChild(card);
      });
    }

    function concluir(id, btn) {
      btn.disabled = true;
      btn.innerText = 'PROCESSANDO...';
      google.script.run
        .withSuccessHandler(res => res.success && updateAlerts())
        .concluirAlerta(id);
    }
  </script>
</body>
</html>
